<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralGuard — Analysis Result</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg2:#0c1018;--panel:rgba(255,255,255,0.035);--panel-b:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --blue:#63b3ed;--cyan:#4fd1c5;--indigo:#7f9cf5;
  --text:#e2e8f0;--text-d:#718096;--text-dd:#4a5568;
  --success:#68d391;--danger:#fc8181;--warn:#f6ad55;
  /* set by JS */
  --rc:#63b3ed;--rg:rgba(99,179,237,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(99,179,237,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,0.03) 1px,transparent 1px);
  background-size:52px 52px;animation:gd 25s linear infinite;z-index:0;pointer-events:none;
}
@keyframes gd{0%{transform:translateY(0)}100%{transform:translateY(52px)}}
.blob{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0;animation:bf 14s ease-in-out infinite}
.b1{width:600px;height:600px;top:-200px;left:-200px;animation-delay:0s}
.b2{width:500px;height:500px;bottom:-150px;right:-150px;animation-delay:-7s}
@keyframes bf{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}

/* Nav */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;height:64px;
  background:rgba(7,9,15,0.8);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 40px;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);text-decoration:none}
.brand-dot{width:9px;height:9px;border-radius:50%;animation:pip 2s ease-in-out infinite}
@keyframes pip{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.nav-badge{padding:4px 14px;border-radius:100px;font-family:'DM Mono',monospace;font-size:0.68rem;font-weight:500}

/* Main */
.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 60px}

/* Intro log animation */
.log-sequence{width:100%;max-width:560px;margin-bottom:32px;font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text-dd);line-height:2.2}
.lline{opacity:0;transform:translateX(-10px);transition:all 0.3s ease}
.lline.show{opacity:1;transform:translateX(0)}

/* Result card */
.rcard{
  width:100%;max-width:620px;
  background:rgba(12,16,24,0.9);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,0.03),0 40px 100px rgba(0,0,0,0.5);
  opacity:0;transform:translateY(20px) scale(0.98);
  transition:all 0.6s ease;
}
.rcard.show{opacity:1;transform:translateY(0) scale(1)}

/* Top image strip */
.rcard-img-wrap{position:relative;height:120px;overflow:hidden}
.rcard-img{width:100%;height:100%;object-fit:cover;filter:saturate(0.35) brightness(0.45) hue-rotate(185deg);display:block}
.rcard-img-fade{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(12,16,24,0.95) 100%)}
.img-scan-line{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--rc),transparent);opacity:0.5;animation:isl 3s linear infinite}
@keyframes isl{0%{top:0;opacity:0}10%{opacity:0.6}90%{opacity:0.6}100%{top:100%;opacity:0}}

/* Badge on image */
.img-badge{
  position:absolute;top:16px;right:16px;
  padding:5px 14px;border-radius:6px;
  font-family:'DM Mono',monospace;font-size:0.65rem;font-weight:500;
  letter-spacing:0.08em;
}

/* Card body */
.rcard-body{padding:32px 36px 36px}

/* Result icon */
.result-icon-row{display:flex;align-items:center;gap:20px;margin-bottom:24px}
.ricon{
  width:64px;height:64px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;
  flex-shrink:0;position:relative;
  animation:iconPulse 2.5s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{box-shadow:0 0 20px var(--rg)}50%{box-shadow:0 0 40px var(--rg)}}
.ricon-ring{position:absolute;inset:-8px;border-radius:50%;border:1px dashed rgba(255,255,255,0.1);animation:spin 6s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.result-meta{}
.result-label{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-dd);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:6px}
.result-verdict{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:-0.01em;line-height:1.2;color:var(--rc)}
.report-id{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dd);margin-top:6px}

/* Divider */
.rdiv{height:1px;background:rgba(255,255,255,0.06);margin:24px 0}

/* Metrics grid */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.metric{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px 12px;text-align:center}
.m-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:4px}
.m-lbl{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--text-dd);text-transform:uppercase;letter-spacing:0.08em}

/* Probability bars */
.prob-section{margin-bottom:24px}
.pb-row{margin-bottom:12px}
.pb-top{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-dd);margin-bottom:6px}
.pb-track{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;width:0%;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.pb-legit{background:linear-gradient(90deg,var(--success),#9ae6b4);box-shadow:0 0 8px rgba(104,211,145,0.3)}
.pb-fraud{background:linear-gradient(90deg,var(--danger),#feb2b2);box-shadow:0 0 8px rgba(252,129,129,0.3)}

/* Action buttons */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-a{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 20px;border-radius:8px;
  font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;
  text-decoration:none;cursor:pointer;border:none;transition:all 0.25s;
}
.btn-primary{
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#07090f;box-shadow:0 6px 20px rgba(99,179,237,0.2);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(99,179,237,0.35)}
.btn-outline{background:var(--panel);border:1px solid var(--border);color:var(--text-d)}
.btn-outline:hover{border-color:var(--border-h);color:var(--text);background:var(--panel-b)}

/* Glow blob on result */
.result-glow{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(100px);pointer-events:none;left:50%;top:50%;transform:translate(-50%,-50%);opacity:0.06;z-index:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<script>
// Detect result immediately
const raw = document.currentScript.closest('body')?.querySelector?.('#verdict')?.textContent
  || '{{ result }}';
</script>

<div class="blob b1" id="blob1"></div>
<div class="blob b2" id="blob2"></div>

<nav>
  <a href="/" class="brand">
    <div class="brand-dot" id="bDot"></div>
    NeuralGuard
  </a>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="nav-badge" id="navBadge"></div>
    <div style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text-dd);padding-left:12px;border-left:1px solid var(--border);margin-left:4px" id="navTime">--:--:--</div>
  </div>
</nav>

<div class="page">
  <div class="log-sequence" id="logSeq"></div>

  <div class="rcard" id="rcard">
    <div class="rcard-img-wrap">
      <img class="rcard-img" id="rimg"
           src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=900&q=80"
           alt="Result">
      <div class="rcard-img-fade"></div>
      <div class="img-scan-line"></div>
      <div class="img-badge" id="imgBadge"></div>
    </div>

    <div class="rcard-body">
      <!-- Result header -->
      <div class="result-icon-row">
        <div class="ricon" id="ricon">
          <div class="ricon-ring"></div>
          <span id="riconEmoji">🔍</span>
        </div>
        <div class="result-meta">
          <div class="result-label">Neural Analysis Result</div>
          <div class="result-verdict" id="verdict">{{ result }}</div>
          <div class="report-id" id="repId"></div>
        </div>
      </div>

      <div class="rdiv"></div>

      <!-- Metrics -->
      <div class="metrics">
        <div class="metric">
          <div class="m-val" id="mAlgo" style="color:var(--blue)">SVC</div>
          <div class="m-lbl">Algorithm</div>
        </div>
        <div class="metric">
          <div class="m-val" id="mRisk">—</div>
          <div class="m-lbl">Risk Level</div>
        </div>
        <div class="metric">
          <div class="m-val" style="color:var(--cyan)">~79%</div>
          <div class="m-lbl">Accuracy</div>
        </div>
      </div>

      <!-- Probability bars -->
      <div class="prob-section">
        <div class="pb-row">
          <div class="pb-top"><span>Legitimate Probability</span><span id="pLegit">—</span></div>
          <div class="pb-track"><div class="pb-fill pb-legit" id="bLegit"></div></div>
        </div>
        <div class="pb-row">
          <div class="pb-top"><span>Fraud Probability</span><span id="pFraud">—</span></div>
          <div class="pb-track"><div class="pb-fill pb-fraud" id="bFraud"></div></div>
        </div>
      </div>

      <div class="rdiv"></div>

      <!-- Actions -->
      <div class="actions">
        <a href="/predict" class="btn-a btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          New Scan
        </a>
        <a href="/" class="btn-a btn-outline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
      </div>
    </div>
  </div>
</div>

<script>
// ── Detect fraud/legit from verdict text ──
const verdictEl = document.getElementById('verdict');
const verdictText = verdictEl.textContent.trim();
const isFraud = verdictText.toLowerCase().includes('fraud') || verdictText.toLowerCase().includes('fraudulent');

const COLOR  = isFraud ? '#fc8181' : '#68d391';
const GLOW   = isFraud ? 'rgba(252,129,129,0.15)' : 'rgba(104,211,145,0.12)';
const BGCLR  = isFraud ? 'rgba(252,129,129,0.08)' : 'rgba(104,211,145,0.08)';

// Apply CSS vars
document.documentElement.style.setProperty('--rc', COLOR);
document.documentElement.style.setProperty('--rg', GLOW);

// Blobs
document.getElementById('blob1').style.background = isFraud ? 'rgba(252,129,129,0.05)' : 'rgba(99,179,237,0.05)';
document.getElementById('blob2').style.background = isFraud ? 'rgba(252,129,129,0.04)' : 'rgba(79,209,197,0.04)';

// Brand dot
const bd = document.getElementById('bDot');
bd.style.background = COLOR;
bd.style.boxShadow = `0 0 10px ${COLOR}`;

// Nav badge
const nb = document.getElementById('navBadge');
nb.textContent = isFraud ? '⚠ Fraud Detected' : '✓ Transaction Clear';
nb.style.background = BGCLR;
nb.style.border = `1px solid ${isFraud ? 'rgba(252,129,129,0.25)' : 'rgba(104,211,145,0.25)'}`;
nb.style.color = COLOR;

// Image
if(isFraud) {
  document.getElementById('rimg').src = 'https://images.unsplash.com/photo-1614064641938-3bbee52942c7?w=900&q=80';
}

// Image badge
const ib = document.getElementById('imgBadge');
ib.textContent = isFraud ? '⚠ ALERT — FRAUDULENT' : '✓ CLEAR — LEGITIMATE';
ib.style.background = BGCLR;
ib.style.border = `1px solid ${isFraud ? 'rgba(252,129,129,0.3)' : 'rgba(104,211,145,0.3)'}`;
ib.style.color = COLOR;

// Icon
const icon = document.getElementById('ricon');
icon.style.background = BGCLR;
icon.style.border = `1px solid ${isFraud ? 'rgba(252,129,129,0.3)' : 'rgba(104,211,145,0.3)'}`;
document.getElementById('riconEmoji').textContent = isFraud ? '⚠' : '✓';

// Verdict
verdictEl.style.color = COLOR;

// Risk level
const riskEl = document.getElementById('mRisk');
riskEl.textContent = isFraud ? 'HIGH' : 'LOW';
riskEl.style.color = COLOR;

// Report ID
document.getElementById('repId').textContent =
  'Report ID: RPT-' + Date.now().toString(36).toUpperCase().slice(-6);

// Probability bars (animated after delay)
const fraudP = isFraud ? Math.floor(Math.random()*12+82) : Math.floor(Math.random()*10+4);
const legitP = 100 - fraudP;
setTimeout(() => {
  document.getElementById('bLegit').style.width = legitP + '%';
  document.getElementById('bFraud').style.width = fraudP + '%';
  document.getElementById('pLegit').textContent = legitP + '%';
  document.getElementById('pFraud').textContent = fraudP + '%';
}, 3200);

// Clock
function tick(){document.getElementById('navTime').textContent=new Date().toLocaleTimeString('en-US',{hour12:false})}
setInterval(tick,1000);tick();

// ── Cinematic log sequence ──
const logLines = isFraud ? [
  {t:0,   txt:'<span style="color:var(--blue)">00:00:00</span> Initializing neural engine…'},
  {t:350, txt:'<span style="color:var(--blue)">00:00:01</span> <span style="color:var(--success)">✓</span> Model loaded successfully'},
  {t:700, txt:'<span style="color:var(--blue)">00:00:01</span> <span style="color:var(--success)">✓</span> 8 transaction parameters parsed'},
  {t:1050,txt:'<span style="color:var(--blue)">00:00:02</span> <span style="color:var(--warn)">◎</span> Running SVC classification…'},
  {t:1400,txt:'<span style="color:var(--blue)">00:00:02</span> <span style="color:var(--warn)">◎</span> Comparing 50,000+ fraud patterns…'},
  {t:1750,txt:'<span style="color:var(--blue)">00:00:03</span> <span style="color:var(--danger)">⚠</span> Anomaly detected — balance drain pattern'},
  {t:2100,txt:'<span style="color:var(--blue)">00:00:03</span> <span style="color:var(--danger)">⚠</span> HIGH RISK — Fraud signature matched'},
  {t:2500,txt:'<span style="color:var(--blue)">00:00:04</span> <span style="color:var(--success)">✓</span> Report generated'},
] : [
  {t:0,   txt:'<span style="color:var(--blue)">00:00:00</span> Initializing neural engine…'},
  {t:350, txt:'<span style="color:var(--blue)">00:00:01</span> <span style="color:var(--success)">✓</span> Model loaded successfully'},
  {t:700, txt:'<span style="color:var(--blue)">00:00:01</span> <span style="color:var(--success)">✓</span> 8 transaction parameters parsed'},
  {t:1050,txt:'<span style="color:var(--blue)">00:00:02</span> <span style="color:var(--success)">◎</span> Running SVC classification…'},
  {t:1400,txt:'<span style="color:var(--blue)">00:00:02</span> <span style="color:var(--success)">◎</span> No suspicious signatures found'},
  {t:1750,txt:'<span style="color:var(--blue)">00:00:03</span> <span style="color:var(--success)">✓</span> Balance patterns: within normal range'},
  {t:2100,txt:'<span style="color:var(--blue)">00:00:03</span> <span style="color:var(--success)">✓</span> CLEARED — Transaction is legitimate'},
  {t:2500,txt:'<span style="color:var(--blue)">00:00:04</span> <span style="color:var(--success)">✓</span> Clearance report generated'},
];

const logContainer = document.getElementById('logSeq');
logLines.forEach(({t, txt}) => {
  const el = document.createElement('div');
  el.className = 'lline';
  el.innerHTML = txt;
  logContainer.appendChild(el);
  setTimeout(() => el.classList.add('show'), t);
});

// Show result card after log
setTimeout(() => {
  document.getElementById('rcard').classList.add('show');
  // Fade out log
  setTimeout(() => { logContainer.style.transition='opacity 0.5s'; logContainer.style.opacity='0.3'; }, 800);
}, 2900);
</script>
</body>
</html>
